[package]
name = "mrlyjs"
version = "0.1.0"
edition = "2021"

[lib]
name = "mrlyjs"
crate-type = ["cdylib"]

[dependencies]
getrandom = { version = "0.2", features = ["js"] }
mrlycore = { path = "../mrlyrs/mrlycore" }
mrlynet = { path = "../mrlyrs/mrlynet" }
mrlyos = { path = "../mrlyrs/mrlyos" }
mrlyui = { path = "../mrlyrs/mrlyui" }
serde_json = "1"
wasm-bindgen = "0.2"
